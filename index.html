<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>书签收藏</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='20'%3E⌖%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⌖</span>
        <div class="logo-text">
          <span class="logo-title">书签库</span>
          <span class="logo-count" id="total-count">0 个书签</span>
        </div>
      </div>
      <div class="search-wrapper">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="search-input" placeholder="搜索书签..." autocomplete="off" />
        <button type="button" class="search-clear" id="search-clear" title="清除搜索">✕</button>
      </div>
    </div>

    <nav class="categories" id="categories-nav">
      <!-- rendered by JS -->
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="footer-btn" id="btn-import" title="导入书签">
        <span class="btn-icon">↑</span>导入
      </button>
      <button type="button" class="footer-btn" id="btn-export" title="导出书签">
        <span class="btn-icon">↓</span>导出
      </button>
      <button type="button" class="footer-btn theme-toggle" id="btn-appearance" title="外观设置">
        <span class="theme-icon">🎨</span>
      </button>
      <button type="button" class="footer-btn theme-toggle" id="btn-theme" title="切换主题">
        <span class="theme-icon" id="theme-icon">◑</span>
      </button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" />
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <header class="main-header">
      <div class="header-title-group">
        <h1 class="header-title" id="header-title">全部书签</h1>
        <span class="header-subtitle" id="header-subtitle"></span>
      </div>
      <div class="density-toggle" id="density-toggle">
        <button type="button" class="density-btn" data-density="compact" title="紧凑列表">≡</button>
        <button type="button" class="density-btn" data-density="default" title="网格视图">⊞</button>
        <button type="button" class="density-btn" data-density="large" title="宽卡片">☐</button>
      </div>
      <button type="button" class="btn-add" id="btn-add-bookmark">
        <span>＋</span> 添加书签
      </button>
    </header>

    <div id="home-search"></div>
    <div class="bookmarks-grid" id="bookmarks-grid">
      <!-- rendered by JS -->
    </div>

    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">◈</div>
      <p class="empty-title">这里还没有书签</p>
      <p class="empty-sub">点击右上角「添加书签」开始收藏</p>
    </div>
  </main>

  <!-- Modal: Add/Edit Bookmark -->
  <div class="modal-overlay" id="modal-bookmark" style="display:none">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-bookmark-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-bookmark-title">添加书签</h2>
        <button type="button" class="modal-close" id="modal-bookmark-close">✕</button>
      </div>
      <form class="modal-form" id="bookmark-form" novalidate>
        <input type="hidden" id="bm-id" />

        <div class="form-group">
          <label class="form-label" for="bm-url">网址 <span class="required">*</span></label>
          <input type="url" class="form-input" id="bm-url" placeholder="https://example.com" autocomplete="off" />
          <span class="form-error" id="bm-url-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="bm-title">标题 <span class="required">*</span></label>
          <input type="text" class="form-input" id="bm-title" placeholder="书签标题" autocomplete="off" />
          <span class="form-error" id="bm-title-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="bm-desc">描述 <span class="optional">选填</span></label>
          <input type="text" class="form-input" id="bm-desc" placeholder="简短描述..." autocomplete="off" />
        </div>

        <div class="form-group">
          <label class="form-label" for="bm-category">分类 <span class="required">*</span></label>
          <select class="form-select" id="bm-category"></select>
        </div>

        <div class="form-group">
          <label class="form-label" for="bm-tags-input">标签 <span class="optional">选填，回车添加</span></label>
          <div class="tags-input-wrapper" id="tags-input-wrapper">
            <div class="tags-chips" id="tags-chips"></div>
            <input type="text" class="tags-raw-input" id="bm-tags-input" placeholder="输入标签后按回车..." autocomplete="off" />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modal-bookmark-cancel">取消</button>
          <button type="submit" class="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Add Category -->
  <div class="modal-overlay" id="modal-category" style="display:none">
    <div class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="modal-cat-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-cat-title">新建分类</h2>
        <button type="button" class="modal-close" id="modal-category-close">✕</button>
      </div>
      <form class="modal-form" id="category-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="cat-emoji">图标</label>
          <div class="emoji-picker" id="emoji-picker">
            <!-- rendered by JS -->
          </div>
          <input type="hidden" id="cat-emoji" value="📁" />
        </div>
        <div class="form-group">
          <label class="form-label" for="cat-name">分类名称 <span class="required">*</span></label>
          <input type="text" class="form-input" id="cat-name" placeholder="例如：设计、工具、娱乐" autocomplete="off" />
          <span class="form-error" id="cat-name-error"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="modal-category-cancel">取消</button>
          <button type="submit" class="btn-save">创建</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Appearance Settings -->
  <div class="modal-overlay" id="modal-appearance" style="display:none">
    <div class="modal modal-appearance" role="dialog" aria-modal="true" aria-labelledby="modal-appearance-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-appearance-title">外观设置</h2>
        <button type="button" class="modal-close" id="modal-appearance-close">✕</button>
      </div>
      <div class="appearance-body">
        <div class="appearance-section">
          <div class="appearance-label">预设主题</div>
          <div class="theme-presets" id="theme-presets"><!-- rendered by JS --></div>
        </div>
        <div class="appearance-divider"></div>
        <div class="appearance-section">
          <div class="appearance-label">自定义颜色</div>
          <div class="color-pickers" id="color-pickers"><!-- rendered by JS --></div>
        </div>
        <div class="appearance-footer">
          <button type="button" class="btn-reset-theme" id="btn-reset-theme">重置为预设</button>
        </div>
      </div>
    </div>
  </div>

  <div class="context-menu" id="context-menu" style="display:none">
    <button type="button" class="context-menu-item" id="ctx-pin">⭐ 固定到首页</button>
    <button type="button" class="context-menu-item" id="ctx-edit">✏️ 编辑</button>
    <div class="context-menu-divider"></div>
    <button type="button" class="context-menu-item context-menu-item--danger" id="ctx-delete">🗑️ 删除</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/data.js"></script>
  <script src="js/favicon.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/events.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
